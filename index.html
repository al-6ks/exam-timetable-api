<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEAB Exam Timetable Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ueabNavy: '#1a237e',
                        ueabGold: '#ffd700',
                        m3Surface: '#f7f9fc',
                        m3DarkBg: '#121212',
                        m3DarkCard: '#1e1e1e',
                        m3DarkBorder: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Google Sans', sans-serif; transition: background-color 0.3s ease; scroll-behavior: smooth; }
        .m3-card { border-radius: 16px; transition: all 0.2s ease; }
        .loading-ring { border: 3px solid #f3f3f3; border-top: 3px solid #ffd700; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .banner-flat { border-bottom: 4px solid #ffd700; }
        
        /* Floating Back to Top Button */
        #backToTop { position: fixed; bottom: 20px; right: 20px; display: none; z-index: 100; }
    </style>
</head>
<body class="bg-m3Surface dark:bg-m3DarkBg text-gray-900 dark:text-gray-100 min-h-screen">

    <header class="bg-ueabNavy dark:bg-black text-white p-5 sticky top-0 z-50 shadow-md flex justify-between items-center banner-flat">
        <div class="flex items-center gap-4">
            <img src="logo.png" onerror="this.src='https://ueab.ac.ke/wp-content/uploads/2021/08/cropped-UEAB-Logo-1-1.png'" alt="UEAB" class="h-10 w-10 object-contain bg-white rounded-full p-1">
            <div>
                <h1 class="text-lg font-bold tracking-tight">Exam Schedule</h1>
                <p class="text-[10px] text-ueabGold uppercase font-bold tracking-widest">UEAB Baraton</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="https://icampus.ueab.ac.ke/Default" target="_blank" class="hidden sm:block text-[10px] font-bold uppercase hover:text-ueabGold transition">iCampus</a>
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition" id="themeToggleBtn">
                </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="md:col-span-1 bg-white dark:bg-m3DarkCard p-6 m3-card shadow-sm border border-gray-200 dark:border-m3DarkBorder">
                <h2 class="text-sm font-black mb-5 text-ueabNavy dark:text-ueabGold uppercase">Add Course</h2>
                <div class="space-y-4">
                    <input type="text" id="newCourseCode" placeholder="INSY213" class="w-full p-3 bg-gray-50 dark:bg-gray-800 border-none rounded-xl focus:ring-2 focus:ring-ueabNavy outline-none uppercase text-sm font-bold">
                    <select id="newClassGroup" class="w-full p-3 bg-gray-50 dark:bg-gray-800 border-none rounded-xl focus:ring-2 focus:ring-ueabNavy outline-none text-sm">
                        <option value="" disabled selected>Select Group...</option>
                        <option value="MAIN">MAIN</option>
                        <option value="GROUP A">GROUP A</option>
                        <option value="GROUP B">GROUP B</option>
                        <option value="INTER SESSION 1">INTER SESSION 1</option>
                        <option value="INTER SESSION 2">INTER SESSION 2</option>
                        <option value="Blended Online">Blended Online</option>
                    </select>
                    <button onclick="addCourse()" class="w-full bg-ueabNavy text-white py-4 rounded-xl font-bold hover:shadow-lg transition">Add to List</button>
                </div>
            </div>

            <div class="md:col-span-2 bg-white/30 dark:bg-m3DarkCard/30 p-2 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
                <div class="flex justify-between items-center p-4">
                    <h2 class="text-xs font-black uppercase text-gray-400">Queue (<span id="courseCount">0</span>)</h2>
                    <button onclick="clearList()" class="text-[10px] text-red-400 hover:text-red-600 font-bold uppercase tracking-tighter">Reset Queue</button>
                </div>
                <div id="courseList" class="flex flex-wrap gap-2 p-2 min-h-[80px]"></div>
                <div class="p-4">
                    <button onclick="buildTimetable()" id="buildButton" disabled class="w-full bg-ueabGold text-ueabNavy p-4 rounded-xl font-black uppercase tracking-widest disabled:opacity-20 transition shadow-lg">Generate My Timetable</button>
                </div>
            </div>
        </div>

        <div id="messageBox" class="hidden p-4 rounded-xl mb-6 text-xs text-center font-bold"></div>

        <div class="flex justify-between items-end mb-6 px-2">
            <h2 class="text-xl font-bold border-l-4 border-ueabGold pl-4">My Final Schedule</h2>
            <div id="actionButtons" class="hidden flex gap-2">
                <button onclick="downloadPDF()" class="bg-gray-100 dark:bg-gray-800 px-4 py-2 rounded-lg text-[10px] font-bold">PDF</button>
                <button onclick="downloadICS()" class="bg-ueabNavy text-white px-4 py-2 rounded-lg text-[10px] font-bold">CALENDAR</button>
                <button onclick="resetSchedule()" class="bg-red-50 text-red-600 dark:bg-red-900/20 px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Reset</button>
            </div>
        </div>

        <div id="resultsTableContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-20">
            <div id="emptyState" class="col-span-full py-16 text-center text-gray-400 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-3xl text-sm">
                No timetable generated yet. Add courses above.
            </div>
        </div>

        <section class="mt-20 pt-10 border-t border-gray-200 dark:border-gray-800">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                <div>
                    <h2 class="text-lg font-bold text-ueabNavy dark:text-ueabGold">University Database</h2>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Total Exams: <span id="dbTotalCount" class="text-ueabNavy dark:text-white">0</span></p>
                </div>
                
                <div class="flex flex-col items-end gap-2 mt-4 md:mt-0">
                    <button onclick="fetchMasterTimetable()" id="masterBtn" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-6 py-2 rounded-xl font-bold text-xs shadow-sm hover:shadow-md transition">Fetch All</button>
                    
                    <div id="masterNav" class="hidden flex items-center gap-3 bg-ueabNavy/5 dark:bg-white/5 p-2 rounded-lg border border-ueabNavy/10">
                        <span class="text-[10px] font-black uppercase text-ueabNavy dark:text-ueabGold">My Units: <span id="matchCount">0</span></span>
                        <div class="flex gap-1">
                            <button onclick="jumpToMatch('up')" class="p-1 hover:bg-ueabGold/20 rounded-md transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
                            </button>
                            <button onclick="jumpToMatch('down')" class="p-1 hover:bg-ueabGold/20 rounded-md transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="queryResultsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3"></div>
        </section>
    </main>

    <button id="backToTop" onclick="scrollToTop()" class="bg-ueabNavy text-white p-3 rounded-full shadow-2xl hover:scale-110 transition active:scale-95">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 11l7-7 7 7M5 19l7-7 7 7"></path></svg>
    </button>

    <script>
        const API_BASE_URL = 'https://exam-timetable-api.vercel.app/api/';
        let courseListArray = [];
        let generatedTimetable = [];
        let matchElements = [];
        let currentMatchIndex = -1;

        // Minimalistic Theme Icons
        const themeIcons = {
            light: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.05 16.05l.707.707M7.757 7.757l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>`,
            dark: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>`
        };

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeToggleBtn').innerHTML = isDark ? themeIcons.light : themeIcons.dark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        const icons = {
            date: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`,
            time: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
            loc: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`
        };

        function checkClash(current, others) {
            return others.some(other => 
                current.exam_date === other.exam_date && 
                ((current.start_time >= other.start_time && current.start_time < other.end_time) ||
                 (other.start_time >= current.start_time && other.start_time < current.end_time))
            );
        }

        function renderCards(data, containerId, isMaster = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(isMaster) matchElements = []; // Reset navigation array

            data.forEach((exam, index) => {
                const isSelected = isMaster && courseListArray.some(c => c.course_code === (exam.course_code || ''));
                const hasClash = !isMaster && checkClash(exam, data.filter((_, i) => i !== index));
                
                const card = document.createElement('div');
                const cardId = isMaster ? `master-exam-${index}` : `my-exam-${index}`;
                card.id = cardId;

                let borderClass = 'border-gray-100 dark:border-m3DarkBorder';
                let bgClass = 'bg-white dark:bg-m3DarkCard';
                
                if (hasClash) { borderClass = 'border-red-500'; bgClass = 'bg-red-50 dark:bg-red-900/10'; }
                if (isSelected) { 
                    borderClass = 'border-ueabGold border-2 shadow-lg scale-[1.02]'; 
                    bgClass = 'bg-ueabGold/5 dark:bg-ueabGold/10';
                    matchElements.push(cardId);
                }

                card.className = `m3-card p-5 border ${borderClass} ${bgClass} shadow-sm`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black px-2 py-1 rounded-md ${hasClash ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-blue-300'}">${exam.course_code || '??'}</span>
                        <span class="text-[9px] font-bold text-gray-300 uppercase">${exam.class_group || 'MAIN'}</span>
                    </div>
                    <h3 class="text-[11px] font-bold mb-4 h-8 overflow-hidden line-clamp-2 leading-tight">${exam.course_title || 'Untitled Exam'}</h3>
                    <div class="space-y-1.5 text-[10px] font-medium text-gray-500 dark:text-gray-400">
                        <div class="flex items-center gap-2">${icons.date} ${formatDate(exam.exam_date)}</div>
                        <div class="flex items-center gap-2">${icons.time} ${exam.start_time || '--'} - ${exam.end_time || '--'}</div>
                        <div class="flex items-center gap-2">${icons.loc} ${exam.venue || 'TBA'}</div>
                    </div>
                `;
                container.appendChild(card);
            });

            if(isMaster) {
                document.getElementById('matchCount').textContent = matchElements.length;
                document.getElementById('masterNav').classList.toggle('hidden', matchElements.length === 0);
            }
        }

        // Navigation for Master List
        function jumpToMatch(direction) {
            if (matchElements.length === 0) return;
            if (direction === 'down') currentMatchIndex = (currentMatchIndex + 1) % matchElements.length;
            else currentMatchIndex = (currentMatchIndex - 1 + matchElements.length) % matchElements.length;

            const targetId = matchElements[currentMatchIndex];
            const element = document.getElementById(targetId);
            const headerOffset = 100;
            const elementPosition = element.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            
            // Subtle flash effect to highlight where we landed
            element.classList.add('ring-4', 'ring-ueabGold/50');
            setTimeout(() => element.classList.remove('ring-4', 'ring-ueabGold/50'), 1000);
        }

        async function fetchMasterTimetable() {
            const btn = document.getElementById('masterBtn');
            btn.innerHTML = '<div class="loading-ring mx-auto"></div>';
            try {
                const res = await fetch(API_BASE_URL + 'query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: "SELECT * FROM exam_timetable ORDER BY exam_date ASC, start_time ASC" })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('dbTotalCount').textContent = result.data.length;
                    const formatted = result.data.map(row => {
                        let obj = {};
                        result.columns.forEach((col, idx) => obj[col.toLowerCase()] = row[idx]);
                        return obj;
                    });
                    renderCards(formatted, 'queryResultsContainer', true);
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = 'Refreshed';
        }

        function resetSchedule() {
            generatedTimetable = [];
            document.getElementById('resultsTableContainer').innerHTML = `<div id="emptyState" class="col-span-full py-16 text-center text-gray-400 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-3xl text-sm">No timetable generated yet.</div>`;
            document.getElementById('actionButtons').classList.add('hidden');
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        window.onscroll = function() {
            const btn = document.getElementById("backToTop");
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) btn.style.display = "block";
            else btn.style.display = "none";
        };

        // ... Keep existing addCourse, buildTimetable, downloadPDF, downloadICS, updateCourseListUI, saveToLocalStorage ...

        function formatDate(str) { return (str && typeof str === 'string') ? str.split(' ')[0] : (str || 'Date TBA'); }

        async function addCourse() {
            const code = document.getElementById('newCourseCode').value.trim().toUpperCase();
            const group = document.getElementById('newClassGroup').value;
            if(!code || !group) return;
            try {
                const res = await fetch(API_BASE_URL + 'check', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course_code: code, class_group: group })
                });
                const data = await res.json();
                if (data.status === 'exists') {
                    courseListArray.push({ course_code: code, class_group: group });
                    saveToLocalStorage(); updateCourseListUI();
                    document.getElementById('newCourseCode').value = '';
                } else { showMessage("Course not found.", "error"); }
            } catch (e) { showMessage("Network error.", "error"); }
        }

        async function buildTimetable() {
            try {
                const res = await fetch(API_BASE_URL + 'timetable', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courses: courseListArray })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    generatedTimetable = data.timetable;
                    document.getElementById('actionButtons').classList.remove('hidden');
                    renderCards(data.timetable, 'resultsTableContainer');
                }
            } catch (e) { showMessage("Build failed.", "error"); }
        }

        function updateCourseListUI() {
            const listDiv = document.getElementById('courseList');
            listDiv.innerHTML = '';
            document.getElementById('courseCount').textContent = courseListArray.length;
            document.getElementById('buildButton').disabled = courseListArray.length === 0;
            courseListArray.forEach((course, index) => {
                const chip = document.createElement('div');
                chip.className = 'bg-gray-100 dark:bg-gray-800 text-[9px] font-black px-3 py-2 rounded-lg flex items-center gap-2 border border-gray-200 dark:border-gray-700 uppercase';
                chip.innerHTML = `${course.course_code} <button onclick="removeCourse(${index})" class="text-red-500">×</button>`;
                listDiv.appendChild(chip);
            });
        }

        function removeCourse(i) { courseListArray.splice(i, 1); saveToLocalStorage(); updateCourseListUI(); }
        function clearList() { courseListArray = []; saveToLocalStorage(); updateCourseListUI(); }
        function saveToLocalStorage() { localStorage.setItem('myExamCourses', JSON.stringify(courseListArray)); }
        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.textContent = msg; box.className = `p-4 rounded-xl mb-6 text-xs text-center font-bold ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-50 text-red-800'}`;
            box.classList.remove('hidden'); setTimeout(() => box.classList.add('hidden'), 4000);
        }

        // Calendar and PDF functions same as before but ensured null safety
        function downloadICS() {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\n";
            generatedTimetable.forEach(e => {
                const d = e.exam_date ? e.exam_date.replace(/-/g, '') : '20260101';
                ics += `BEGIN:VEVENT\nSUMMARY:EXAM: ${e.course_code}\nDTSTART:${d}T080000\nLOCATION:${e.venue}\nEND:VEVENT\n`;
            });
            ics += "END:VCALENDAR";
            const blob = new Blob([ics], {type: 'text/calendar'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Exams.ics'; a.click();
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("UEAB Exam Schedule", 15, 15);
            const body = generatedTimetable.map(e => [formatDate(e.exam_date), e.start_time, e.course_code, e.course_title, e.venue]);
            doc.autoTable({ startY: 20, head: [['Date', 'Time', 'Code', 'Course', 'Venue']], body });
            doc.save('Timetable.pdf');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) document.documentElement.classList.add('dark');
            document.getElementById('themeToggleBtn').innerHTML = isDark ? themeIcons.light : themeIcons.dark;
            const saved = localStorage.getItem('myExamCourses');
            if (saved) { courseListArray = JSON.parse(saved); updateCourseListUI(); }
        });
    </script>
</body>
</html>
