<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEAB Exam Timetable Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ueabNavy: '#1a237e',
                        ueabGold: '#ffd700',
                        m3Surface: '#f7f9fc',
                        m3DarkBg: '#121212',
                        m3DarkCard: '#1e1e1e'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Google Sans', sans-serif; transition: background-color 0.3s ease; }
        .m3-card { border-radius: 28px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .loading-ring { border: 3px solid #f3f3f3; border-top: 3px solid #ffd700; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-m3Surface dark:bg-m3DarkBg text-gray-900 dark:text-gray-100 min-h-screen">

    <header class="bg-ueabNavy dark:bg-black text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center rounded-b-3xl">
        <div class="flex items-center gap-3">
            <img src="https://ueab.ac.ke/wp-content/uploads/2021/08/cropped-UEAB-Logo-1-1.png" alt="Logo" class="h-10 w-10 object-contain">
            <div>
                <h1 class="text-lg font-bold">UEAB Exams</h1>
                <p class="text-[10px] text-ueabGold uppercase tracking-widest">Timetable Builder</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="https://icampus.ueab.ac.ke/Default" target="_blank" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-2 rounded-full flex items-center gap-2 transition">
                <span>iCampus</span>
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-white/10 hover:bg-white/20">
                <span id="themeIcon">🌙</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="md:col-span-1 bg-white dark:bg-m3DarkCard p-6 m3-card shadow-sm border border-gray-100 dark:border-gray-800">
                <h2 class="text-xl font-bold mb-4 text-ueabNavy dark:text-ueabGold">Add Course</h2>
                <div class="space-y-4">
                    <input type="text" id="newCourseCode" placeholder="COURSE CODE (e.g. INSY213)" class="w-full p-3 bg-gray-50 dark:bg-gray-800 border-none rounded-2xl focus:ring-2 focus:ring-ueabNavy outline-none uppercase text-sm">
                    <select id="newClassGroup" class="w-full p-3 bg-gray-50 dark:bg-gray-800 border-none rounded-2xl focus:ring-2 focus:ring-ueabNavy outline-none text-sm">
                        <option value="" disabled selected>Select Group...</option>
                        <option value="MAIN">MAIN</option>
                        <option value="GROUP A">GROUP A</option>
                        <option value="GROUP B">GROUP B</option>
                        <option value="INTER SESSION 1">INTER SESSION 1</option>
                    </select>
                    <button onclick="addCourse()" class="w-full bg-ueabNavy text-white py-3 rounded-2xl font-bold hover:opacity-90 transition shadow-md">+ Add to List</button>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="text-xl font-bold text-gray-700 dark:text-gray-300">Your List (<span id="courseCount">0</span>)</h2>
                    <button onclick="clearList()" class="text-xs text-red-500 hover:underline">Clear All</button>
                </div>
                <div id="courseList" class="flex flex-wrap gap-2 mb-4"></div>
                <button onclick="buildTimetable()" id="buildButton" disabled class="w-full bg-ueabGold text-ueabNavy p-4 rounded-3xl font-bold hover:shadow-xl transition disabled:opacity-30">Generate Final Schedule</button>
            </div>
        </div>

        <div id="messageBox" class="hidden p-4 rounded-2xl mb-6 text-sm text-center font-medium animate-pulse"></div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-ueabNavy dark:text-white">Personalized Schedule</h2>
            <div id="actionButtons" class="hidden flex gap-2">
                <button onclick="downloadPDF()" class="bg-red-600 text-white px-4 py-2 rounded-full text-xs font-bold">PDF</button>
                <button onclick="downloadICS()" class="bg-green-600 text-white px-4 py-2 rounded-full text-xs font-bold">Add to Calendar</button>
            </div>
        </div>

        <div id="resultsTableContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            <div id="emptyState" class="col-span-full py-20 text-center text-gray-400">
                <p class="text-5xl mb-4">📅</p>
                <p>No exams generated yet.</p>
            </div>
        </div>

        <section class="mt-16 p-8 bg-ueabNavy/5 dark:bg-white/5 rounded-[40px] border border-ueabNavy/10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-ueabNavy dark:text-ueabGold">Full University Schedule</h2>
                    <p class="text-gray-500 dark:text-gray-400 text-sm">Reference all exams currently in the database.</p>
                </div>
                <button onclick="fetchMasterTimetable()" id="masterBtn" class="bg-ueabNavy dark:bg-ueabGold dark:text-ueabNavy text-white px-8 py-3 rounded-full font-bold shadow-lg">Fetch Master List</button>
            </div>
            <div id="queryResultsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <script>
        const API_BASE_URL = 'https://exam-timetable-api.vercel.app/api/';
        let courseListArray = [];
        let generatedTimetable = [];

        // 1. Dark Mode Toggle
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // 2. Clash Detection Logic
        function checkClash(current, others) {
            return others.some(other => 
                current.exam_date === other.exam_date && 
                ((current.start_time >= other.start_time && current.start_time < other.end_time) ||
                 (other.start_time >= current.start_time && other.start_time < current.end_time))
            );
        }

        function renderCards(data, containerId, isMaster = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            data.forEach((exam, index) => {
                const hasClash = !isMaster && checkClash(exam, data.filter((_, i) => i !== index));
                const card = document.createElement('div');
                card.className = `m3-card p-6 border-2 transition-all duration-300 ${hasClash ? 'border-red-500 bg-red-50 dark:bg-red-900/20' : 'border-transparent bg-white dark:bg-m3DarkCard shadow-md'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold px-2 py-1 rounded-md ${hasClash ? 'bg-red-500 text-white' : 'bg-ueabNavy text-white dark:bg-ueabGold dark:text-ueabNavy'}">${exam.course_code}</span>
                        ${hasClash ? '<span class="text-[10px] text-red-600 font-black">⚠️ CLASH</span>' : ''}
                    </div>
                    <h3 class="text-sm font-bold mb-3 line-clamp-2 h-10">${exam.course_title}</h3>
                    <div class="space-y-2 text-xs text-gray-600 dark:text-gray-400">
                        <div class="flex items-center gap-2"><span>📅</span> ${formatDate(exam.exam_date)}</div>
                        <div class="flex items-center gap-2"><span>⏰</span> ${exam.start_time} - ${exam.end_time}</div>
                        <div class="flex items-center gap-2"><span>📍</span> ${exam.venue}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 3. Calendar Export (.ics)
        function downloadICS() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//UEAB Timetable//EN\n";
            generatedTimetable.forEach(exam => {
                const dateClean = exam.exam_date.replace(/-/g, '');
                const startClean = exam.start_time.replace(/:/g, '') + "00";
                const endClean = exam.end_time.replace(/:/g, '') + "00";
                icsContent += "BEGIN:VEVENT\n";
                icsContent += `SUMMARY:EXAM: ${exam.course_code}\n`;
                icsContent += `DTSTART:${dateClean}T${startClean}\n`;
                icsContent += `DTEND:${dateClean}T${endClean}\n`;
                icsContent += `LOCATION:${exam.venue}\n`;
                icsContent += `DESCRIPTION:Title: ${exam.course_title}\n`;
                icsContent += "END:VEVENT\n";
            });
            icsContent += "END:VCALENDAR";
            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'UEAB_Exams.ics';
            a.click();
        }

        // 4. Enhanced PDF Export
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Header
            doc.setFillColor(26, 35, 126); // Navy
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("Personal Exam Schedule", 15, 20);
            doc.setFontSize(10);
            doc.setTextColor(255, 215, 0); // Gold
            doc.text("University of Eastern Africa, Baraton", 15, 28);

            const tableData = generatedTimetable.map(e => [
                formatDate(e.exam_date), 
                `${e.start_time} - ${e.end_time}`, 
                e.course_code, 
                e.course_title, 
                e.venue
            ]);

            doc.autoTable({
                startY: 50,
                head: [['Date', 'Time', 'Code', 'Course Title', 'Venue']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [26, 35, 126] },
                alternateRowStyles: { fillColor: [240, 240, 240] },
                margin: { left: 15, right: 15 }
            });

            doc.save('UEAB_Official_Timetable.pdf');
        }

        // Existing functions with UI updates
        async function buildTimetable() {
            try {
                const res = await fetch(API_BASE_URL + 'timetable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courses: courseListArray })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    generatedTimetable = data.timetable;
                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('actionButtons').classList.remove('hidden');
                    renderCards(data.timetable, 'resultsTableContainer');
                }
            } catch (e) { showMessage("Fetch failed.", "error"); }
        }

        async function fetchMasterTimetable() {
            const btn = document.getElementById('masterBtn');
            btn.innerHTML = '<div class="loading-ring"></div>';
            try {
                const res = await fetch(API_BASE_URL + 'query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: "SELECT * FROM exam_timetable ORDER BY exam_date ASC" })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    // Mapping dynamic SQL array to object structure
                    const formatted = result.data.map(row => {
                        let obj = {};
                        result.columns.forEach((col, idx) => obj[col.toLowerCase()] = row[idx]);
                        return obj;
                    });
                    renderCards(formatted, 'queryResultsContainer', true);
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = 'Fetch Master List';
        }

        function formatDate(str) { return str ? str.split(' ')[0] : '-'; }
        
        function updateCourseListUI() {
            const listDiv = document.getElementById('courseList');
            const buildBtn = document.getElementById('buildButton');
            listDiv.innerHTML = '';
            document.getElementById('courseCount').textContent = courseListArray.length;
            buildBtn.disabled = courseListArray.length === 0;

            courseListArray.forEach((course, index) => {
                const chip = document.createElement('div');
                chip.className = 'bg-ueabNavy/10 dark:bg-ueabGold/20 text-ueabNavy dark:text-ueabGold px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2';
                chip.innerHTML = `${course.course_code} <button onclick="removeCourse(${index})" class="hover:text-red-500">×</button>`;
                listDiv.appendChild(chip);
            });
        }

        function removeCourse(i) { courseListArray.splice(i, 1); saveToLocalStorage(); updateCourseListUI(); }
        function clearList() { courseListArray = []; saveToLocalStorage(); updateCourseListUI(); }
        function saveToLocalStorage() { localStorage.setItem('myExamCourses', JSON.stringify(courseListArray)); }

        async function addCourse() {
            const code = document.getElementById('newCourseCode').value.trim().toUpperCase();
            const group = document.getElementById('newClassGroup').value;
            if(!code || !group) return;
            try {
                const res = await fetch(API_BASE_URL + 'check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course_code: code, class_group: group })
                });
                const data = await res.json();
                if (data.status === 'exists') {
                    courseListArray.push({ course_code: code, class_group: group });
                    saveToLocalStorage(); updateCourseListUI();
                    document.getElementById('newCourseCode').value = '';
                } else { showMessage("Course not found in system.", "error"); }
            } catch (e) { showMessage("Connection error.", "error"); }
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.textContent = msg;
            box.className = `p-4 rounded-2xl mb-6 text-sm text-center font-bold ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('myExamCourses');
            if (saved) { courseListArray = JSON.parse(saved); updateCourseListUI(); }
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
        });
    </script>
</body>
</html>
