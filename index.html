-<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEAB Exam Timetable Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ueabNavy: '#1a237e',
                        ueabGold: '#ffd700',
                        m3Surface: '#f7f9fc',
                        m3DarkBg: '#121212',
                        m3DarkCard: '#1e1e1e',
                        m3DarkBorder: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Google Sans', sans-serif; transition: background-color 0.3s ease; }
        .m3-card { border-radius: 16px; transition: all 0.2s ease; }
        .loading-ring { border: 3px solid #f3f3f3; border-top: 3px solid #ffd700; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Professional Banner Fix */
        .banner-flat { border-bottom: 4px solid #ffd700; }
    </style>
</head>
<body class="bg-m3Surface dark:bg-m3DarkBg text-gray-900 dark:text-gray-100 min-h-screen">

    <header class="bg-ueabNavy dark:bg-black text-white p-5 sticky top-0 z-50 shadow-md flex justify-between items-center banner-flat">
        <div class="flex items-center gap-4">
            <img src="logo.png" onerror="this.src='https://ueab.ac.ke/wp-content/uploads/2021/08/cropped-UEAB-Logo-1-1.png'" alt="UEAB" class="h-12 w-12 object-contain bg-white rounded-full p-1">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Exam Schedule</h1>
                <p class="text-[10px] text-ueabGold uppercase font-bold">University of Eastern Africa, Baraton</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="https://icampus.ueab.ac.ke/Default" target="_blank" class="hidden sm:flex items-center gap-2 text-xs bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 transition">
                <span>iCampus</span>
            </a>
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-white/10 hover:bg-white/20">
                <span id="themeIcon">🌙</span>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="md:col-span-1 bg-white dark:bg-m3DarkCard p-6 m3-card shadow-sm border border-gray-200 dark:border-m3DarkBorder">
                <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-ueabNavy dark:text-ueabGold">
                    Add New Course
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Course Code</label>
                        <input type="text" id="newCourseCode" placeholder="INSY213" class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-800 border-none rounded-xl focus:ring-2 focus:ring-ueabNavy outline-none uppercase text-sm font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Class Group</label>
                        <select id="newClassGroup" class="w-full mt-1 p-3 bg-gray-50 dark:bg-gray-800 border-none rounded-xl focus:ring-2 focus:ring-ueabNavy outline-none text-sm">
                            <option value="" disabled selected>Select...</option>
                            <option value="MAIN">MAIN</option>
                            <option value="GROUP A">GROUP A</option>
                            <option value="GROUP B">GROUP B</option>
                            <option value="INTER SESSION 1">INTER SESSION 1</option>
                            <option value="INTER SESSION 2">INTER SESSION 2</option>
                            <option value="Blended Online">Blended Online</option>
                        </select>
                    </div>
                    <button onclick="addCourse()" class="w-full bg-ueabNavy text-white py-4 rounded-xl font-bold hover:shadow-lg transition">Add to List</button>
                </div>
            </div>

            <div class="md:col-span-2 bg-white/50 dark:bg-m3DarkCard/30 p-2 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
                <div class="flex justify-between items-center p-4">
                    <h2 class="font-bold text-gray-500">Queue (<span id="courseCount">0</span>)</h2>
                    <button onclick="clearList()" class="text-xs text-red-400 hover:text-red-600 uppercase font-bold">Reset</button>
                </div>
                <div id="courseList" class="flex flex-wrap gap-2 p-2 min-h-[100px]"></div>
                <div class="p-4">
                    <button onclick="buildTimetable()" id="buildButton" disabled class="w-full bg-ueabGold text-ueabNavy p-4 rounded-xl font-black uppercase tracking-widest disabled:opacity-20 shadow-lg">Generate Schedule</button>
                </div>
            </div>
        </div>

        <div id="messageBox" class="hidden p-4 rounded-xl mb-6 text-sm text-center font-bold"></div>

        <div class="flex justify-between items-end mb-6">
            <h2 class="text-2xl font-bold border-l-4 border-ueabGold pl-4">My Schedule</h2>
            <div id="actionButtons" class="hidden flex gap-2">
                <button onclick="downloadPDF()" class="bg-gray-200 dark:bg-gray-800 px-5 py-2 rounded-lg text-xs font-bold hover:bg-gray-300 transition">PDF</button>
                <button onclick="downloadICS()" class="bg-ueabNavy text-white px-5 py-2 rounded-lg text-xs font-bold hover:opacity-90 transition">Add to Calendar</button>
            </div>
        </div>

        <div id="resultsTableContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-20">
            <div id="emptyState" class="col-span-full py-16 text-center text-gray-400 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-3xl">
                <p>No exams generated yet.</p>
            </div>
        </div>

        <section class="mt-20 border-t border-gray-200 dark:border-gray-800 pt-10">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8">
                <div>
                    <h2 class="text-xl font-bold text-ueabNavy dark:text-ueabGold">University Master List</h2>
                    <p class="text-xs text-gray-500">Click to cross-reference your units with the full database.</p>
                </div>
                <button onclick="fetchMasterTimetable()" id="masterBtn" class="mt-4 md:mt-0 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-8 py-3 rounded-xl font-bold text-sm shadow-sm hover:shadow-md transition">Fetch Full Timetable</button>
            </div>
            <div id="queryResultsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3"></div>
        </section>
    </main>

    <script>
        const API_BASE_URL = 'https://exam-timetable-api.vercel.app/api/';
        let courseListArray = [];
        let generatedTimetable = [];

        // Dark Mode Logic
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // SVG Icons
        const icons = {
            date: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`,
            time: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
            loc: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`
        };

        function checkClash(current, others) {
            return others.some(other => 
                current.exam_date === other.exam_date && 
                ((current.start_time >= other.start_time && current.start_time < other.end_time) ||
                 (other.start_time >= current.start_time && other.start_time < current.end_time))
            );
        }

        function renderCards(data, containerId, isMaster = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            data.forEach((exam, index) => {
                // Check if this course is one of the user's selected ones (For Highlighting in Master List)
                const isSelected = isMaster && courseListArray.some(c => c.course_code === exam.course_code);
                
                const hasClash = !isMaster && checkClash(exam, data.filter((_, i) => i !== index));
                
                const card = document.createElement('div');
                // Color logic: Red for clash, Navy/Gold for selection, Grey for standard
                let borderClass = 'border-gray-100 dark:border-m3DarkBorder';
                let bgClass = 'bg-white dark:bg-m3DarkCard';
                
                if (hasClash) { borderClass = 'border-red-500'; bgClass = 'bg-red-50 dark:bg-red-900/10'; }
                if (isSelected) { borderClass = 'border-ueabGold'; bgClass = 'bg-ueabGold/5 dark:bg-ueabGold/10'; }

                card.className = `m3-card p-5 border-2 ${borderClass} ${bgClass} shadow-sm`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black px-2 py-1 rounded-md tracking-tighter ${hasClash ? 'bg-red-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-blue-400'}">${exam.course_code || 'N/A'}</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">${exam.class_group || 'MAIN'}</span>
                    </div>
                    <h3 class="text-xs font-bold mb-4 h-8 overflow-hidden line-clamp-2 leading-tight">${exam.course_title || 'No Title Available'}</h3>
                    <div class="space-y-2 text-[11px] font-medium text-gray-500 dark:text-gray-400">
                        <div class="flex items-center gap-2">${icons.date} ${formatDate(exam.exam_date)}</div>
                        <div class="flex items-center gap-2">${icons.time} ${exam.start_time || '--'} - ${exam.end_time || '--'}</div>
                        <div class="flex items-center gap-2">${icons.loc} ${exam.venue || 'TBA'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function downloadICS() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//UEAB Timetable//EN\n";
            generatedTimetable.forEach(exam => {
                const dateClean = exam.exam_date ? exam.exam_date.replace(/-/g, '') : '20260101';
                const startClean = exam.start_time ? exam.start_time.replace(/:/g, '') + "00" : '080000';
                const endClean = exam.end_time ? exam.end_time.replace(/:/g, '') + "00" : '100000';
                icsContent += "BEGIN:VEVENT\n";
                icsContent += `SUMMARY:EXAM: ${exam.course_code}\n`;
                icsContent += `DTSTART:${dateClean}T${startClean}\n`;
                icsContent += `DTEND:${dateClean}T${endClean}\n`;
                icsContent += `LOCATION:${exam.venue}\n`;
                icsContent += "END:VEVENT\n";
            });
            icsContent += "END:VCALENDAR";
            const blob = new Blob([icsContent], { type: 'text/calendar' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'MyExams.ics'; a.click();
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            doc.setFillColor(26, 35, 126); doc.rect(0, 0, 210, 30, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(16); doc.text("OFFICIAL EXAM SCHEDULE", 15, 15);
            doc.setFontSize(8); doc.setTextColor(255, 215, 0); doc.text("University of Eastern Africa, Baraton", 15, 22);

            const tableData = generatedTimetable.map(e => [formatDate(e.exam_date), `${e.start_time}-${e.end_time}`, e.course_code, e.course_title, e.venue]);
            doc.autoTable({ startY: 40, head: [['Date', 'Time', 'Code', 'Course Title', 'Venue']], body: tableData, theme: 'grid', headStyles: { fillColor: [26, 35, 126] }});
            doc.save('UEAB_Exams.pdf');
        }

        async function buildTimetable() {
            try {
                const res = await fetch(API_BASE_URL + 'timetable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courses: courseListArray })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    generatedTimetable = data.timetable;
                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('actionButtons').classList.remove('hidden');
                    renderCards(data.timetable, 'resultsTableContainer');
                }
            } catch (e) { showMessage("Fetch failed.", "error"); }
        }

        async function fetchMasterTimetable() {
            const btn = document.getElementById('masterBtn');
            btn.innerHTML = '<div class="loading-ring mx-auto"></div>';
            try {
                const res = await fetch(API_BASE_URL + 'query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: "SELECT * FROM exam_timetable ORDER BY exam_date ASC" })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    const formatted = result.data.map(row => {
                        let obj = {};
                        result.columns.forEach((col, idx) => obj[col.toLowerCase()] = row[idx]);
                        return obj;
                    });
                    renderCards(formatted, 'queryResultsContainer', true);
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = 'Refreshed';
        }

        function formatDate(str) { return (str && typeof str === 'string') ? str.split(' ')[0] : (str || 'Date TBA'); }
        
        function updateCourseListUI() {
            const listDiv = document.getElementById('courseList');
            listDiv.innerHTML = '';
            document.getElementById('courseCount').textContent = courseListArray.length;
            document.getElementById('buildButton').disabled = courseListArray.length === 0;

            courseListArray.forEach((course, index) => {
                const chip = document.createElement('div');
                chip.className = 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 px-3 py-2 rounded-lg text-[10px] font-bold flex items-center gap-2 border border-gray-200 dark:border-gray-700';
                chip.innerHTML = `${course.course_code} (${course.class_group}) <button onclick="removeCourse(${index})" class="text-red-400">×</button>`;
                listDiv.appendChild(chip);
            });
        }

        function removeCourse(i) { courseListArray.splice(i, 1); saveToLocalStorage(); updateCourseListUI(); }
        function clearList() { courseListArray = []; saveToLocalStorage(); updateCourseListUI(); }
        function saveToLocalStorage() { localStorage.setItem('myExamCourses', JSON.stringify(courseListArray)); }

        async function addCourse() {
            const code = document.getElementById('newCourseCode').value.trim().toUpperCase();
            const group = document.getElementById('newClassGroup').value;
            if(!code || !group) return;
            try {
                const res = await fetch(API_BASE_URL + 'check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course_code: code, class_group: group })
                });
                const data = await res.json();
                if (data.status === 'exists') {
                    courseListArray.push({ course_code: code, class_group: group });
                    saveToLocalStorage(); updateCourseListUI();
                    document.getElementById('newCourseCode').value = '';
                } else { showMessage("Not found in database.", "error"); }
            } catch (e) { showMessage("Error.", "error"); }
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.textContent = msg;
            box.className = `p-4 rounded-xl mb-6 text-sm ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-50 text-red-800 border border-red-100'}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('myExamCourses');
            if (saved) { courseListArray = JSON.parse(saved); updateCourseListUI(); }
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
        });
    </script>
</body>
</html>
